name: fieldtaxa
description: "FieldTaxa — Field taxonomy observation app for iOS and Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^15.1.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Persistence
  sqflite: ^2.4.1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Camera & media
  image_picker: ^1.1.2
  video_player: ^2.9.5

  # Location
  geolocator: ^13.0.4

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/MPeditechLogo.png
    - assets/icon_a3.svg

  fonts: []
